services:
# crea contenedor con PostgreSQL
  postgres:
    image: postgres:16
    container_name: discord_postgres
    restart: always
    # expone PostgreSQL en el puerto definido en el .env
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
# guarda los datos de PostgreSQL en un volumen para persistencia
volumes:
  postgres_data: